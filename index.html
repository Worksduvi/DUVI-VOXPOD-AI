<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuviVox & DuviPod Pro Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: "rgba(255,255,255,0.1)",
              background: "#020617",
              foreground: "#f8fafc",
              primary: "#6366f1",
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'slide-up': 'slideUp 0.5s ease-out',
              'spin-slow': 'spin 8s linear infinite',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px rgba(99, 102, 241, 0.2)' },
                '100%': { boxShadow: '0 0 20px rgba(99, 102, 241, 0.6)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: 0 },
                '100%': { transform: 'translateY(0)', opacity: 1 },
              }
            }
          }
        }
      }
    </script>
    <style>
      body { 
        font-family: 'Inter', sans-serif; 
        background-color: #020617; 
        color: #f8fafc; 
        margin: 0;
        padding: 0;
        overflow-x: hidden; 
      }
      .glass { 
        backdrop-filter: blur(20px); 
        background: rgba(15, 23, 42, 0.8); 
        border: 1px solid rgba(255,255,255,0.1); 
      }
      .shimmer-text {
        background: linear-gradient(90deg, #818cf8 25%, #e0e7ff 50%, #818cf8 75%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        animation: shimmer 4s infinite linear;
      }
      @keyframes shimmer { to { background-position: 200% center; } }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .custom-range { 
        -webkit-appearance: none; 
        background: #1e293b; 
        height: 6px; 
        border-radius: 10px; 
        width: 100%;
      }
      .custom-range::-webkit-slider-thumb { 
        -webkit-appearance: none; 
        width: 18px; 
        height: 18px; 
        background: #6366f1; 
        border-radius: 50%; 
        cursor: pointer; 
        border: 2px solid white; 
        box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
      }
      .btn-glow:hover { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
